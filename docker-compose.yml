services:
  db:
    image: postgres:15-alpine
    container_name: monitoria_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - monitoria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: monitoria_api
    restart: always
    ports:
      - "${API_PORT}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: ${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoria_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: monitoria_web
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_URL: ${API_URL}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      - api
    networks:
      - monitoria_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:

networks:
  monitoria_net:
    driver: bridge
