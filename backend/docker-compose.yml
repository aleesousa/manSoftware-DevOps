version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: monitoria_db
    restart: always
    environment:
      POSTGRES_DB: monitoria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - monitoria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: monitoria_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - src/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoria_net

volumes:
  pgdata:

networks:
  monitoria_net:
    driver: bridge
